spring:
  datasource:
    url: jdbc:h2:file:./data/wishmap;DB_CLOSE_DELAY=-1;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false

# local 전용 JWT 시크릿 (개발용)
jwt:
  secret: local-dev-secret-key-do-not-use-in-production-1234567890

naver:
  search:
    client-id: ${NAVER_SEARCH_CLIENT_ID:}
    client-secret: ${NAVER_SEARCH_CLIENT_SECRET:}

logging:
  level:
    com.mindbridge: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
