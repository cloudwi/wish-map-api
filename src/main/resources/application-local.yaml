spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/wishmap
    driver-class-name: org.postgresql.Driver
    username: wishmap
    password: wishmap
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

# local 전용 JWT 시크릿 (개발용)
jwt:
  secret: local-dev-secret-key-do-not-use-in-production-1234567890

naver:
  search:
    client-id: ${NAVER_SEARCH_CLIENT_ID:}
    client-secret: ${NAVER_SEARCH_CLIENT_SECRET:}

logging:
  level:
    com.mindbridge: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
