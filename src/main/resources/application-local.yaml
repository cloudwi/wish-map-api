spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/wishmap
    driver-class-name: org.postgresql.Driver
    username: wishmap
    password: wishmap
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 100
  flyway:
    enabled: true
    locations: classpath:db/migration

# local 전용 JWT 시크릿 (개발용)
jwt:
  secret: local-dev-secret-key-do-not-use-in-production-1234567890

naver:
  search:
    client-id: ${NAVER_SEARCH_CLIENT_ID:}
    client-secret: ${NAVER_SEARCH_CLIENT_SECRET:}

oauth:
  google:
    client-id: 386596705781-6tep6l6v4ftslcrcbdipakl72d26k750.apps.googleusercontent.com
  apple:
    client-id: com.wishmap.app

logging:
  level:
    com.mindbridge: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
