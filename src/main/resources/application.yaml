spring:
  application:
    name: wish-map-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  flyway:
    enabled: true
  webmvc:
    problemdetails:
      enabled: true

# JWT 설정
jwt:
  secret: ${JWT_SECRET:}
  access-token-expiration: 1800000  # 30분 (ms)
  refresh-token-expiration: 604800000  # 7일 (ms)

# Naver Search API
naver:
  search:
    client-id: ${NAVER_SEARCH_CLIENT_ID:}
    client-secret: ${NAVER_SEARCH_CLIENT_SECRET:}

# Supabase Storage (이미지 업로드)
supabase:
  url: ${SUPABASE_URL:https://bzlufgaifypdixrmvmga.supabase.co}
  key: ${SUPABASE_KEY:}
  bucket: restaurant-images

# Multipart 파일 업로드 설정
spring.servlet.multipart:
  max-file-size: 5MB
  max-request-size: 25MB

# OAuth 설정
oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID:}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  naver:
    client-id: ${NAVER_CLIENT_ID:}
    client-secret: ${NAVER_CLIENT_SECRET:}
  apple:
    client-id: ${APPLE_CLIENT_ID:}
    key-id: ${APPLE_KEY_ID:}
    team-id: ${APPLE_TEAM_ID:}
