spring:
  application:
    name: wish-map-api
  profiles:
    active: local

# JWT 설정
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-make-it-long-enough-for-security}
  access-token-expiration: 1800000  # 30분 (ms)
  refresh-token-expiration: 604800000  # 7일 (ms)

# OAuth 설정
oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  apple:
    client-id: ${APPLE_CLIENT_ID:}

# 서버 설정
server:
  error:
    include-message: never
    include-stacktrace: never
    include-exception: false

---
# Local 프로필
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:wishmap;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.mindbridge: DEBUG
    org.springframework.security: DEBUG

---
# Dev 프로필
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:wishmap}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

---
# Prod 프로필
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    root: WARN
    com.mindbridge: INFO
