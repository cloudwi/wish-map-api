spring:
  application:
    name: wish-map-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  flyway:
    enabled: true
  webmvc:
    problemdetails:
      enabled: true

# JWT 설정
jwt:
  secret: ${JWT_SECRET:}
  access-token-expiration: 1800000  # 30분 (ms)
  refresh-token-expiration: 604800000  # 7일 (ms)

# Naver Search API
naver:
  search:
    client-id: ${NAVER_SEARCH_CLIENT_ID:}
    client-secret: ${NAVER_SEARCH_CLIENT_SECRET:}

# Supabase Storage (이미지 업로드)
supabase:
  url: ${SUPABASE_URL:https://bzlufgaifypdixrmvmga.supabase.co}
  key: ${SUPABASE_KEY:}
  bucket: restaurant-images

# Multipart 파일 업로드 설정
spring.servlet.multipart:
  max-file-size: 5MB
  max-request-size: 25MB

# OAuth 설정 (공개 값 - 토큰 audience 검증용)
oauth:
  google:
    client-id: 386596705781-6tep6l6v4ftslcrcbdipakl72d26k750.apps.googleusercontent.com
  apple:
    client-id: com.wishmap.app
