spring:
  datasource:
    # URLмқҖ IntegrationTest л¶ҖлӘЁ нҒҙлһҳмҠӨмқҳ @DynamicPropertySourceлЎң мЈјмһ…лҗЁ
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        default_batch_fetch_size: 100
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: test-secret-key-for-integration-tests-1234567890-abcdefghij
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

naver:
  search:
    client-id: test-client-id
    client-secret: test-client-secret

supabase:
  url: http://localhost:9999
  key: test-supabase-key
  bucket: restaurant-images

oauth:
  google:
    client-id: test-google-client-id.apps.googleusercontent.com
  apple:
    client-id: com.wishmap.test

logging:
  level:
    root: WARN
    com.mindbridge: INFO
    org.testcontainers: INFO
    org.flywaydb: INFO
